name: Refresh BIC Database

on:
  schedule:
    # First day of each month at 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Seed BIC database from GLEIF
        run: npm run db:seed

      - name: Enrich country names
        run: npm run db:enrich

      - name: Run tests
        run: npm run test

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bic.sqlite
          if git diff --staged --quiet; then
            echo "No changes to BIC database"
          else
            git commit -m "chore: refresh BIC database from GLEIF (monthly cron)"
            git push
          fi
